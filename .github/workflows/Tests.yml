name: Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        type: choice
        options:
          - preprod
          - staging
          - dev
        required: true
        default: 'preprod'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Start Checksum Node Server
        run: |
          echo "Starting Node.js Checksum Server..."
          cd checksum
          npm install
          node index.js &
          sleep 5 
        
      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Karate Testsù
        continue-on-error: true
        run: mvn clean test     
   
         
      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v3
        with:
          path: jmeter
          key: jmeter-5.6.3

      - name: Install JMeter 5.6.3
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter
          rm apache-jmeter-5.6.3.tgz

      - name: Run Performance Tests
        run: |
          # On boucle sur chaque fichier .jmx du dossier
          for file in src/test/jmeter/*.jmx; do
            echo "Running test: $file"
            ./jmeter/bin/jmeter -n \
            -t "$file" \
            -l "results_$(basename $file .jmx).jtl" \
            -Jjmeter.save.saveservice.output_format=xml \
            -Jjmeter.save.saveservice.assertion_results=all
          done

          
      - name: Install xsltproc
        run: sudo apt-get update && sudo apt-get install -y xsltproc
          
      - name: Convert JTL to JUnit XML
        run: |
          # 1. On récupère dynamiquement le nom du premier test JMX
          FILENAME=$(basename $(ls src/test/jmeter/*.jmx | head -n 1) .jmx)
          echo "Nom detecte : $FILENAME"
          
          # 2. On définit le fichier JTL source (celui généré par l'étape précédente)
          # Si vous utilisez ma boucle 'for', le fichier s'appelle results_$FILENAME.jtl
          JTL_FILE="results_${FILENAME}.jtl"
          
          # Vérification si le fichier existe pour éviter l'erreur "failed to load"
          if [ ! -f "$JTL_FILE" ]; then
            echo "ERREUR : Le fichier $JTL_FILE n'existe pas. Vérifiez l'étape de Run."
            exit 1
          fi

          # 3. Création du template XSL
          cat << 'EOF' > jmeter-results-to-junit.xsl
          <?xml version="1.0" encoding="UTF-8"?>
          <xsl:stylesheet xmlns:xsl="http://w3.org" version="1.0">
            <xsl:output method="xml" indent="yes" encoding="UTF-8"/>
            <xsl:template match="/testResults">
              <testsuites>
                <testsuite name="JMeterTests">
                  <xsl:for-each select="*">
                    <testcase>
                      <xsl:attribute name="classname">JMeter.<xsl:value-of select="@lb"/></xsl:attribute>
                      <xsl:attribute name="name"><xsl:value-of select="@lb"/></xsl:attribute>
                      <xsl:attribute name="time"><xsl:value-of select="@t div 1000"/></xsl:attribute>
                      <xsl:if test="@s = 'false'">
                        <failure>La requete a echoue (Status code <xsl:value-of select="@rc"/>)</failure>
                      </xsl:if>
                    </testcase>
                  </xsl:for-each>
                </testsuite>
              </testsuites>
            </xsl:template>
          </xsl:stylesheet>
          EOF
          
          # 4. Conversion avec le bon nom de fichier
          xsltproc jmeter-results-to-junit.xsl "$JTL_FILE" > junit-report.xml

          
      - name: Upload JUnit Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-junit-report
          path: junit-report.xml  
          
      - name: Sauvegarde des rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
