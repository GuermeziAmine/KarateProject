name: Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v3
        with:
          path: jmeter
          key: jmeter-5.6.3

      - name: Install JMeter 5.6.3
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter
          rm apache-jmeter-5.6.3.tgz

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation de Taurus (bzt)
        run: pip install bzt

      - name: Exécution des tests JMeter via Taurus
        run: >
          bzt src/test/jmeter/PERF_Test1.jmx
          -o modules.jmeter.path=jmeter/bin/jmeter
          -o reporting.0.module=junit-xml
          -o reporting.0.filename=report_octane.xml
          -o reporting.0.data-source=sample-labels
          -o reporting.0.sample-labels=true
          -quiet

      - name: Sauvegarde du rapport JUnit (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-test-results
          path: report_octane.xml
          retention-days: 5