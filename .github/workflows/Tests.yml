name: Tests 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration du JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Execution des tests Karate
      run: mvn test

    - name: Install JMeter 5.6.3
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        mv apache-jmeter-5.6.3 jmeter

    - name: Run JMeter tests
      run: |
        mkdir -p jmeter-results
        ./jmeter/bin/jmeter -n \
          -t src/test/jmeter/ThreadGroup.jmx \
          -l jmeter-results/jmeter-results.xml \
          -Jjmeter.save.saveservice.output_format=xml

    - name: Sauvegarde des rapports Karate
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports/

    - name: Sauvegarde des rapports JMeter
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-results
        path: jmeter-results/