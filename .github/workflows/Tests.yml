name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        type: choice
        options:
          - preprod
          - staging
          - dev
        required: true
        default: 'preprod'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Start Checksum Node Server
        run: |
          echo "Starting Node.js Checksum Server..."
          cd checksum
          npm install
          node index.js &
          sleep 5 
        
      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
   
         


      - name: Install JMeter 5.6.3
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter
          
      - name: Install xsltproc
        run: sudo apt-get update && sudo apt-get install -y xsltproc
          
      - name: Convert JTL to JUnit XML
        run: |
            FILENAME=$(basename $(ls src/test/jmeter/*.jmx | head -n 1) .jmx)
            echo "Nom detecte pour Octane : $FILENAME"
            
            # ATTENTION: Pas de guillemets autour de EOF ici !
            cat << EOF > jmeter-results-to-junit.xsl
            <?xml version="1.0" encoding="UTF-8"?>
            <xsl:stylesheet xmlns:xsl="http://www.w3.org/1999/XSL/Transform" version="1.0">
              <xsl:output method="xml" indent="yes" encoding="UTF-8"/>
              <xsl:template match="/testResults">
                <testsuites>
                  <testsuite>
                    <xsl:for-each select="*">
                      <testcase>
                        <xsl:attribute name="classname"><xsl:value-of select="name()"/></xsl:attribute>
                        <xsl:attribute name="name">$FILENAME</xsl:attribute>
                        <xsl:attribute name="time"><xsl:value-of select="@lt div 1000"/></xsl:attribute>
                        <xsl:if test="assertionResult/failureMessage">
                          <failure><xsl:value-of select="assertionResult/failureMessage"/></failure>
                        </xsl:if>
                        <xsl:if test="@s = 'false'">
                          <error>La requete a echoue (voir les logs JMeter)</error>
                        </xsl:if>
                      </testcase>
                    </xsl:for-each>
                  </testsuite>
                </testsuites>
              </xsl:template>
            </xsl:stylesheet>
            EOF
            
            xsltproc jmeter-results-to-junit.xsl results.jtl > junit-report.xml
          
      - name: Upload JUnit Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-junit-report
          path: junit-report.xml  
          
      - name: Sauvegarde des rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
