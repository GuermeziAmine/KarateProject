name: Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v3
        with:
          path: jmeter
          key: jmeter-5.6.3

      - name: Install JMeter 5.6.3
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter
          rm apache-jmeter-5.6.3.tgz

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation de Taurus (bzt)
        run: | 
          pip install bzt
          pip install urwid==2.1.2

      - name: Créer la configuration Taurus
        run: |
          cat <<EOF > octane_config.yml
          modules:
            jmeter:
              path: jmeter/bin/jmeter
          reporting:
          - module: junit-xml
            filename: report_octane.xml
            data-source: sample-labels
            sample-labels: true
          settings:
            check-updates: false
          EOF

      - name: Exécuter les tests JMeter
        continue-on-error: true 
        run: bzt src/test/jmeter/PERF_Test1.jmx octane_config.yml -q

      - name: Normaliser le nom de classe pour ALM Octane
        
        run: |
          sed -i -E 's/classname="bzt-[0-9]+"/classname="JMeter_API_Tests"/g' report_octane.xml

      - name: Sauvegarde du rapport JUnit (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-test-results
          path: report_octane.xml
          retention-days: 5